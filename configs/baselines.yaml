# =============================================================================
# CEINN Phase 5 — baseline hyperparameter table
#
# `train_baseline.py` merges these into the dataset YAML's `training:` block,
# so the entries here OVERRIDE anything the dataset YAML sets (which is the
# right precedence — dataset YAML carries CEINN's tuned values, not the
# baselines'). Per-baseline-per-dataset values take final precedence.
#
# Lookup order in train_baseline.py:
#   1) baselines._default                  — global defaults
#   2) baselines[<baseline>]._default      — per-baseline shared
#   3) baselines[<baseline>][<dataset>]    — per-baseline per-dataset
#
# Plan §5.2 specifies the canonical hparams:
#   d = 64 (Amazon), 128 (MovieLens)
#   max_epochs = 200, patience = 10 (on Val NDCG@10)
#   Adam, lr = 5e-4
#   batch_size = 256 (Amazon), 512 (MovieLens)
#   Full Ranking evaluation
# =============================================================================

_default:
  seed: 0
  max_epochs: 200
  early_stop_patience: 10
  lr: 5e-4
  weight_decay: 1.0e-5
  num_workers: 0
  val_batch_size: 256

# -----------------------------------------------------------------------------
# PopRec — fit-once, no hyperparameters to tune. Listed for completeness.
# -----------------------------------------------------------------------------
poprec:
  _default:
    # PopRec has no hparams beyond eval bookkeeping. We still write a
    # train_log.csv row so downstream tooling treats it identically.
    max_epochs: 1
    early_stop_patience: 1
  amazon_beauty:
    val_batch_size: 256
  movielens_10m:
    val_batch_size: 512

# -----------------------------------------------------------------------------
# BPR-MF — pairwise BPR + uniform-random negatives. One pair per training
# interaction per epoch. Weight decay is critical for BPR-MF to avoid
# embedding-norm blow-up.
# -----------------------------------------------------------------------------
bpr_mf:
  _default:
    n_layers: 0          # unused; here for log uniformity
    dropout: 0.0         # unused
    grad_clip: 0.0       # BPR's gradients are well-bounded; no clipping needed
  amazon_beauty:
    d: 64
    batch_size: 256
    weight_decay: 1.0e-5
  movielens_10m:
    d: 128
    batch_size: 512
    weight_decay: 1.0e-5

# -----------------------------------------------------------------------------
# GRU4Rec — session-based GRU + full-vocab CE + tied output embedding.
# We use 1 layer (the original paper's setting) by default.
# -----------------------------------------------------------------------------
gru4rec:
  _default:
    n_layers: 1
    grad_clip: 1.0
    weight_decay: 0.0    # the GRU's recurrent weights respond poorly to wd
  amazon_beauty:
    d: 64
    dropout: 0.2         # matches CEINN's Amazon backbone dropout
    batch_size: 256
  movielens_10m:
    d: 128
    dropout: 0.1         # matches CEINN's ML backbone dropout
    batch_size: 512

# -----------------------------------------------------------------------------
# SASRec — causal Transformer + shift-by-one full-vocab CE.
#
# Architecture defaults follow the paper:
#   * 2 attention heads, 2 encoder layers
#   * tied output projection (= input item embedding)
#   * learned position embeddings
#   * pre-norm Transformer (modern reproducible setup)
#
# Dropout differs per dataset because Amazon Beauty is far sparser
# (heavier dropout helps), while MovieLens-10M's denser sequences tolerate
# (and prefer) the lower CEINN-backbone-matching value.
# -----------------------------------------------------------------------------
sasrec:
  _default:
    n_layers: 2
    n_heads: 2
    ff_mult: 4           # FFN inner dim = 4·d (modern Transformer convention)
    grad_clip: 5.0       # SASRec gradients are larger than GRU's; clip looser
    weight_decay: 0.0
  amazon_beauty:
    d: 64
    dropout: 0.5         # SASRec paper's setting for sparse Amazon corpora
    batch_size: 256
  movielens_10m:
    d: 128
    dropout: 0.2         # denser data → less aggressive dropout
    batch_size: 512

# -----------------------------------------------------------------------------
# BERT4Rec — bidirectional Transformer + Masked-LM (Cloze) training.
#
# Architecture defaults follow the paper, but with two practical adjustments
# documented in `models/bert4rec.py`:
#   * pure [MASK] replacement (no BERT 80/10/10 random-token trick)
#   * each training row guaranteed ≥ 1 masked position
#
# `mask_prob` is the masking probability per non-PAD position. The paper
# reports 0.2 as optimal for Amazon Beauty / MovieLens-1M / Steam in their
# grid search; we follow that, but it's a key knob worth re-tuning if the
# dataset distribution shifts significantly.
# -----------------------------------------------------------------------------
bert4rec:
  _default:
    n_layers: 2
    n_heads: 2
    ff_mult: 4
    mask_prob: 0.2       # P(mask) per non-PAD position; paper-recommended
    grad_clip: 5.0
    weight_decay: 0.0
  amazon_beauty:
    d: 64
    dropout: 0.2         # BERT4Rec uses lighter dropout than SASRec here
    batch_size: 256
  movielens_10m:
    d: 128
    dropout: 0.2
    batch_size: 512
