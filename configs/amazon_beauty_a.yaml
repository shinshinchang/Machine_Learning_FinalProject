# =============================================================================
# CEINN — Amazon Beauty configuration
# =============================================================================
# This file is the SINGLE SOURCE OF TRUTH for Amazon-Beauty preprocessing and
# training. Phase 1 fields (validation baselines + tolerances) are kept; the
# Phase 2 / Phase 6 sections have been hand-tuned for a memory-constrained
# host. If you have >= 16 GB RAM and a CUDA GPU, you can safely double the
# batch sizes below.
# =============================================================================

dataset:
  name: amazon_beauty
  paths:
    reviews_5core: data/raw/Beauty_5.json   # 5-core file used by EDA; preferred source
    reviews:       data/raw/reviews_Beauty.json   # full dump, fallback only
    meta:          data/raw/meta_Beauty.json
  encoding:
    default: utf-8

# -----------------------------------------------------------------------------
# Validation baselines (EDA_report_AmazonBeauty.md §1, §2.1, §3.3, §4)
# -----------------------------------------------------------------------------
validation:
  n_interactions:           198502
  n_users:                  22363
  n_items:                  12101
  n_leaf_categories:        222
  rating_share_5:           0.5770
  price_coverage:           0.9517
  salesrank_any_coverage:   0.982
  salesrank_beauty_coverage: 0.883
  brand_coverage:           0.828
  time_range_start:         '2002-06-12'
  time_range_end:           '2014-07-23'
  time_span_days:           4424

tolerance:
  count_exact:    0
  ratio_pp:       0.001
  coverage_pp:    0.005
  date_days:      1
  span_days:      2

# =============================================================================
# Phase 2: preprocessing & feature engineering
# =============================================================================
preprocess:
  output_dir: data/processed/amazon_beauty

  five_core:
    source: reviews_5core
    min_count: 5

  id_remap:
    pad_index: 0
    start_index: 1

  split:
    strategy: leave_one_out_temporal
    tie_breaker: file_order

  dt_bucketing:
    n_bins: 32          # bin 0 = PAD; real bins 1..31
    base: 10
    fit_on: train

  truncation:
    max_seq_len: 50     # covers EDA P99 = 43

  rating_bins:
    n_bins: 6           # {0=PAD, 1..5 = star ratings}

  category:
    primary_only: true
    min_item_count: 5
    pad_index: 0

  brand:
    min_item_count: 10
    pad_index: 0

  price:
    log_base: 10
    imputation: leaf_median_then_global

  salesrank_Z:
    n_bins: 10                # bucket per item; 0..9
    log_base: 10
    add_one: true
    median_bin_for_missing: 5
    salesrank_key: Beauty

# =============================================================================
# Phase 6: training & evaluation
# =============================================================================
training:
  # ---- Bookkeeping --------------------------------------------------------
  seed: 0
  output_dir: runs/amazon_beauty
  device: auto                      # cpu | cuda | auto

  # ---- Architecture (suggested initial values; see §6.1) ------------------
  architecture:
    d:                    64
    n_layers:             2
    n_heads:              2         # d=64 must be divisible by n_heads
    dropout:              0.2
    propensity_hidden:    64
    propensity_z_emb_dim: 16
    discriminator_hidden: null      # null → default = min(128, max(64, 2*d))

  # ---- Optimisation -------------------------------------------------------
  lr:                  0.0005       # 5e-4 Adam(W)
  batch_size:          128          # halved from §6.2 "256" for memory safety
  val_batch_size:      64           # eval uses (B, V=12102) score tensor
  max_epochs:          100          # patience 15 + best-state save covers it
  early_stop_patience: 15
  grad_clip:           1.0
  lambda_reg:          0.00001      # AdamW weight_decay

  # ---- Loss configuration -------------------------------------------------
  # See train.py "Loss strategy" docstring. Four modes via `ablation.loss_mode`:
  #   ips_choice    — L_IPS-weighted choice loss (default)
  #   snips_choice  — Self-Normalised IPS (A4)
  #   seq_choice    — un-weighted CE over utilities (A2 w/o IPS)
  lambda_adv:          0.1
  ips_clip_tau:        30.0         # §6.2 Amazon range {10, 20, 50}; 30 is a safe default

  # ---- Propensity training -----------------------------------------------
  propensity_warmup_epochs: 1
  propensity_lr:            0.001

  # ---- Validation throttle (used by train.py only) -----------------------
  # If your dataset is very large you can validate on a sample each epoch
  # by setting this to an integer. `null` = use all val users. evaluate.py
  # ALWAYS uses all users (regardless of this).
  val_max_users:       null

  # ---- Ablation toggles (CEINN-Full reproduces with these defaults) ------
  ablation:
    use_rating_emb:       true        # A1: false to remove E_r
    loss_mode:            ips_choice  # A2/A4 control
    use_grl:              true        # A3: false to disable adversarial pressure
    use_economics:        true        # A5: false → utility = h_t · E_i (raw dot product)
    use_cost:             true        # A6: false → U = V (no λ_u·C term)
    fixed_lambda_u:       false       # A7: true → λ_u clamped to fixed_lambda_u_value
    fixed_lambda_u_value: 0.5
    use_temporal_emb:     true        # A8: false → zero out dt_ids

  # ---- Two-stage hyperparameter search (§6.3) ----------------------------
  # Read by scripts/hparam_search.py (Phase 6 §6.3.1 / §6.3.2).
  hparam_search_space:
    stage1_n_samples:   20
    stage1_max_epochs:  50
    stage1_top_k:       3
    stage2_max_epochs:  200
    search_seed:        42
    space:
      d:            [32, 64, 128]
      n_layers:     [1, 2, 3]
      n_heads:      [1, 2, 4]
      dropout:      [0.1, 0.2, 0.3, 0.5]
      lr:           [0.0001, 0.0005, 0.001]
      lambda_adv:   [0.001, 0.01, 0.1, 1.0]
      lambda_reg:   [0.00001, 0.0001, 0.001]
      ips_clip_tau: [10.0, 20.0, 50.0]

  # ---- Final paper run (§6.4) --------------------------------------------
  final_seeds: [0, 1, 2, 3, 4]
