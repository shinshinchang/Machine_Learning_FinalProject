# =============================================================================
# CEINN — MovieLens 10M configuration
# Phase 1 fields only: raw paths + EDA-derived validation baselines.
# =============================================================================

dataset:
  name: movielens_10M
  paths:
    ratings: data/raw/ml-10M100K/ratings.dat   # UserID::MovieID::Rating::Timestamp
    movies:  data/raw/ml-10M100K/movies.dat    # MovieID::Title::Genres
    tags:    data/raw/ml-10M100K/tags.dat      # UserID::MovieID::Tag::Timestamp
  encoding:
    # ratings.dat and tags.dat are ASCII-safe, but movies.dat contains
    # Latin-1 accents in foreign-language titles (e.g., "Cité de Dieu").
    # UTF-8 will raise UnicodeDecodeError on those rows — use ISO-8859-1.
    ratings: utf-8
    movies:  iso-8859-1
    tags:    utf-8

# -----------------------------------------------------------------------------
# Validation baselines, transcribed from
# EDA_report_Movielens10M.md §1, §2.1, §4.1, §4.3.
# -----------------------------------------------------------------------------
validation:
  # §1, Table 1: dataset scale ---------------------------------------------
  n_interactions_raw:    10000054   # before 5-core filtering
  n_interactions_5core:   9998816   # after iterative 5-core filtering
  n_users:                  69878   # unchanged by 5-core (all users start with >=20 ratings)
  n_items_5core:            10196   # movies surviving the 5-core graph
  n_items_raw:              10681   # all distinct MovieIDs in ratings.dat (informational)

  # §2.1: rating distribution (computed on the RAW file, per EDA) ----------
  rating_half_star_share: 0.205    # share of ratings ∈ {0.5, 1.5, 2.5, 3.5, 4.5}
  rating_share_5:         0.154    # share of 5.0 ratings
  rating_entropy:         2.758393    # Shannon entropy of the 10-bin rating histogram (bits)

  # §4.1: genre vocabulary -------------------------------------------------
  n_genres:                  19    # distinct genre labels excluding "(no genres listed)"

  # §4.3: tags -------------------------------------------------------------
  n_tag_events:           95580
  tag_singleton_share:    0.559    # share of unique tag strings appearing only once
  n_tag_vocab:            15240    # is actually 15241 but fixed to avoid time loss # distinct tag strings (informational; case-sensitive)

  # §1 & §5: timeline ------------------------------------------------------
  time_range_start:      '1995-01-09'  # min UTC date
  time_range_end:        '2009-01-05'  # max UTC date
  time_span_days:         5109

# -----------------------------------------------------------------------------
# Tolerances. Note rating_entropy gets its own bound because the spec is
# precise to 3 decimals (1.912 bits ± 0.01).
# -----------------------------------------------------------------------------
tolerance:
  count_exact:    0
  ratio_pp:       0.001    # ±0.1 percentage points
  coverage_pp:    0.005    # ±0.5 percentage points
  entropy_abs:    0.01     # rating entropy: ±0.01 bits
  date_days:      1
  span_days:      2

# =============================================================================
# Phase 2: preprocessing & feature engineering
# =============================================================================
preprocess:
  output_dir: data/processed/movielens_10m

  # ---- 5-core filtering (verified in Phase 1 as a near-no-op) ---------------
  five_core:
    min_count: 5

  # ---- ID remapping ---------------------------------------------------------
  id_remap:
    pad_index: 0
    start_index: 1

  # ---- Session segmentation (Plan §2.3.1) -----------------------------------
  # EDA: 78.9% of adjacent Δt are < 60 seconds — almost all from batch
  # back-filling. Treat those as belonging to the same session.
  session:
    boundary_seconds: 60     # < 60s → same session
    within_session_dt: PAD   # how to encode Δt for intra-session steps
                              # ("PAD" → bin 0; alternative would be a special bin)

  # ---- Split (leave-one-out, temporal) --------------------------------------
  split:
    strategy: leave_one_out_temporal
    tie_breaker: file_order

  # ---- Δt log-bucketing -----------------------------------------------------
  # Plan §2.1.4: 64 buckets for ML (Δt spans ~8.47 log-decades).
  dt_bucketing:
    n_bins: 64
    base: 10
    fit_on: train

  # ---- Sequence truncation --------------------------------------------------
  truncation:
    max_seq_len: 200          # Plan §2.1.5

  # ---- Rating embedding bin count -------------------------------------------
  # Ratings live on the 0.5-grid: {0.5, 1.0, ..., 5.0} = 10 distinct values.
  # We multiply by 2 to integerise (0.5 -> 1, ..., 5.0 -> 10), reserving 0
  # for PAD. So 11 slots total.
  rating_bins:
    n_bins: 11                # {0=PAD, 1..10 = half-star ratings}

  # ---- 2009 truncation (Plan §2.3.5) ----------------------------------------
  # Drop training interactions whose UTC year is >= 2009 (only 14,549 rows
  # before 2009-01-05; keeping them risks distribution-shift artefacts).
  # Val/test are left untouched to preserve evaluation correctness.
  exclude_year_from_train:
    enabled: true
    year_threshold: 2009

  # ---- GenreRed (Jaccard) preprocessing (Plan §2.3.4) ----------------------
  genre_red:
    n_genres: 19              # excludes "(no genres listed)"
    no_genre_sentinel: "(no genres listed)"
    # IDF weights are computed on the full 5-core movie corpus, NOT the
    # training interactions — the IDF is a property of the catalogue.
    idf_smooth: true
    # If history is empty (first interaction), Jaccard is 0 by convention.

  # ---- Dynamic Z_i(t) precomputation (Plan §2.3.3) -------------------------
  dynamic_Z:
    # Z_i(t) = cumulative interaction count of item i strictly before t,
    # measured on the TRAINING set only (val/test are never used to
    # increment counts, which would constitute leakage).
    count_source: train_only

# =============================================================================
# Phase 6: training & evaluation
# =============================================================================
training:
  seed: 0
  output_dir: runs/movielens_10m
  num_workers: 0

  architecture:
    d:            128       # §6.1 ML suggests larger d
    n_layers:     2
    n_heads:      4         # d=128 must be divisible by n_heads
    dropout:      0.1
    propensity_hidden:    64
    propensity_z_emb_dim: 16
    discriminator_hidden: null

  # ---- Optimisation ---------------------------------------------------------
  lr:            0.0005
  batch_size:    64 # 512        # §6.2 ML suggests 512
  val_batch_size: 64 # 256
  max_epochs:    300 # 200
  early_stop_patience: 15 # 10
  grad_clip:     1.0
  lambda_reg:    0.00001

  # ---- Loss configuration ---------------------------------------------------
  lambda_adv:    0.01 # 0.1
  # §9.2 Failure Mode 2: ML's max 1/p_i is 6,972.8 — Self-Normalised is the
  # recommended default; Clipped requires very large τ.
  ips_variant:   self_normalized
  ips_clip_tau:  100.0       # §6.2: ML τ ∈ {50, 100, 200}

  # MovieLens-specific: number of negatives per supervised position.
  # 100 is the standard SASRec/BERT4Rec figure and gives stable training.
  ml_n_negs:     50 # 100

  # Z-bucket discretisation of dynamic Z(t) for the discriminator + IPS.
  # 10 buckets matches Amazon's salesRank decile choice (symmetry).
  n_z_buckets:   10

  # ---- Propensity training --------------------------------------------------
  propensity_warmup_epochs: 1
  propensity_lr:            0.001

  # ---- Ablation toggles -----------------------------------------------------
  ablation:
    use_rating_emb:    true
    loss_mode:         ips_choice
    use_grl:           true
    use_economics:     true
    use_cost:          true
    fixed_lambda_u:    false
    fixed_lambda_u_value: 0.5
    use_temporal_emb:  true

  # ---- Two-stage hyperparameter search -------------------------------------
  hparam_search_space:
    stage1_n_samples:   20
    stage1_max_epochs:  50
    stage1_top_k:       3
    stage2_max_epochs:  200
    search_seed:        42
    space:
      d:            [32, 64, 128]
      n_layers:     [1, 2, 3]
      n_heads:      [1, 2, 4]
      dropout:      [0.1, 0.2, 0.3, 0.5]
      lr:           [0.0001, 0.0005, 0.001]
      lambda_adv:   [0.001, 0.01, 0.1, 1.0]
      lambda_reg:   [0.00001, 0.0001, 0.001]
      ips_clip_tau: [50.0, 100.0, 200.0]    # ML: large τ
      ips_variant:  [clipped, self_normalized]

  final_seeds: [0, 1, 2, 3, 4]
